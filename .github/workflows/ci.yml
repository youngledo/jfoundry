name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - production-readiness-release
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java:
          - 21
          - 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Run tests
        run: ./mvnw -B test

  package:
    name: Package artifacts
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Package without tests
        run: ./mvnw -B -DskipTests package

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run middleware integration tests
        run: ./mvnw -B -pl jfoundry-verification/jfoundry-middleware-integration-tests -am -Pit verify

  maven-4:
    name: Maven 4 compatibility
    runs-on: ubuntu-latest
    needs: package
    env:
      MAVEN_VERSION: 4.0.0-rc-5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Install Maven 4
        run: |
          curl -fsSLo /tmp/apache-maven-${MAVEN_VERSION}-bin.tar.gz \
            https://archive.apache.org/dist/maven/maven-4/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz
          tar -xzf /tmp/apache-maven-${MAVEN_VERSION}-bin.tar.gz -C /tmp
          echo "/tmp/apache-maven-${MAVEN_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Check Maven 4 package compatibility
        run: mvn -B -DskipTests package
