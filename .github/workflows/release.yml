name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version to publish, without the leading v.
        required: true
      next_snapshot_version:
        description: Next development version. Defaults to the next patch SNAPSHOT.
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve-release:
    name: Resolve release versions
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.versions.outputs.release_version }}
      next_snapshot: ${{ steps.versions.outputs.next_snapshot }}
    steps:
      - name: Resolve release versions
        id: versions
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          INPUT_RELEASE_VERSION: ${{ inputs.release_version }}
          INPUT_NEXT_SNAPSHOT_VERSION: ${{ inputs.next_snapshot_version }}
        run: |
          set -euo pipefail

          release_version="${INPUT_RELEASE_VERSION:-${RELEASE_TAG#v}}"
          if [[ -z "${release_version}" ]]; then
            echo "release_version is required for manual runs." >&2
            exit 1
          fi
          if [[ "${release_version}" == *-SNAPSHOT ]]; then
            echo "Release version must not be a SNAPSHOT: ${release_version}" >&2
            exit 1
          fi

          next_snapshot="${INPUT_NEXT_SNAPSHOT_VERSION:-}"
          if [[ -z "${next_snapshot}" && -n "${RELEASE_BODY:-}" ]]; then
            next_snapshot="$(printf '%s\n' "${RELEASE_BODY}" \
              | sed -nE 's/^[Nn]ext-[Ss]napshot:[[:space:]]*([^[:space:]]+)[[:space:]]*$/\1/p' \
              | head -n 1)"
          fi
          if [[ -z "${next_snapshot}" ]]; then
            IFS=. read -r major minor patch extra <<< "${release_version}"
            if [[ -z "${major:-}" || -z "${minor:-}" || -z "${patch:-}" || -n "${extra:-}" || ! "${patch}" =~ ^[0-9]+$ ]]; then
              echo "Cannot infer next snapshot from ${release_version}; set next_snapshot_version or add 'Next-Snapshot: x.y.z-SNAPSHOT' to the release notes." >&2
              exit 1
            fi
            next_snapshot="${major}.${minor}.$((patch + 1))-SNAPSHOT"
          fi
          if [[ "${next_snapshot}" != *-SNAPSHOT ]]; then
            echo "Next development version must be a SNAPSHOT: ${next_snapshot}" >&2
            exit 1
          fi

          {
            echo "release_version=${release_version}"
            echo "next_snapshot=${next_snapshot}"
          } >> "$GITHUB_OUTPUT"

  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    needs: resolve-release
    environment: maven-central
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java and Maven Central credentials
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Set release version
        run: |
          ./mvnw -B org.codehaus.mojo:versions-maven-plugin:2.21.0:set \
            -DnewVersion="${{ needs.resolve-release.outputs.release_version }}" \
            -DprocessAllModules=true \
            -DgenerateBackupPoms=false

      - name: Publish staged deployment
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: ./mvnw -B -Prelease -DskipTests deploy -Dgpg.passphrase="${GPG_PASSPHRASE}"

  bump-default-branch:
    name: Bump default branch to next SNAPSHOT
    runs-on: ubuntu-latest
    needs:
      - resolve-release
      - publish
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Bump default branch to next SNAPSHOT
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "${DEFAULT_BRANCH}"
          git worktree add -B "release-bump/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" /tmp/jfoundry-default-branch "origin/${DEFAULT_BRANCH}"
          cd /tmp/jfoundry-default-branch

          ./mvnw -B org.codehaus.mojo:versions-maven-plugin:2.21.0:set \
            -DnewVersion="${{ needs.resolve-release.outputs.next_snapshot }}" \
            -DprocessAllModules=true \
            -DgenerateBackupPoms=false

          if git diff --quiet; then
            echo "Default branch is already at ${{ needs.resolve-release.outputs.next_snapshot }}."
            exit 0
          fi

          git add pom.xml '**/pom.xml'
          git commit -m "chore(release): start ${{ needs.resolve-release.outputs.next_snapshot }}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
