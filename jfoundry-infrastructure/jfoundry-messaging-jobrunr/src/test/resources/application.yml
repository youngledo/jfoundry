spring:
  datasource:
    url: jdbc:h2:mem:jobrunr-it;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:db/migration/V20260617__create_outbox_event.sql

org:
  jobrunr:
    background-job-server:
      enabled: true
      worker-count: 2
      poll-interval-in-seconds: 5
    database:
      type: sql
    # Retry count is controlled per-job via @Job(retries = 3) on JobRunrOutboxDispatcher.recurringDispatch;
    # JobRunr 6.3.5 minimum recurring interval is 5s (enforced unconditionally, no opt-in flag).

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
